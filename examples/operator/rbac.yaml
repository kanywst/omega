---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: omega-operator
  namespace: omega-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: omega-operator
rules:
  - apiGroups: ["omega.kanywst.github.io"]
    resources: ["omegadomains"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["omega.kanywst.github.io"]
    resources: ["omegadomains/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: omega-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: omega-operator
subjects:
  - kind: ServiceAccount
    name: omega-operator
    namespace: omega-system
