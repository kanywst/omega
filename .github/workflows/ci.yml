name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: omega
          POSTGRES_PASSWORD: omega
          POSTGRES_DB: omega
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U omega -d omega"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      OMEGA_TEST_POSTGRES_DSN: postgres://omega:omega@127.0.0.1:5432/omega?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: build
        run: make build
      - name: test
        run: make test

  cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: cross-compile (linux/darwin x amd64/arm64)
        run: make cross

  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: end-to-end demo (hello-svid)
        run: make demo

  examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: [federation, postgres, postgres-ha, mcp-a2a-delegation, audit-siem, oidc-federation]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: build omega and put on PATH
        run: |
          make build
          echo "$PWD/bin" >> "$GITHUB_PATH"
      - name: run example demo
        working-directory: examples/${{ matrix.example }}
        run: make demo

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: latest
      - name: helm lint
        run: helm lint charts/omega
      - name: helm template (render check)
        run: helm template omega charts/omega > /dev/null

  kind-operator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: build omega and put on PATH
        run: |
          make build
          echo "$PWD/bin" >> "$GITHUB_PATH"
      - uses: helm/kind-action@v1
        with:
          cluster_name: omega-operator
      - name: install cert-manager CRDs
        # The OmegaIssuer reconciler resolves cert-manager.io/v1 types at
        # boot. Without the CRDs the operator exits before reaching the
        # OmegaDomain controller. Pin to the cert-manager version go.mod
        # already depends on.
        run: kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.19.3/cert-manager.crds.yaml
      - name: install OmegaDomain CRD
        run: kubectl apply -f charts/omega/crds/omegadomain.yaml
      - name: start omega control plane
        run: |
          omega server --http-addr 127.0.0.1:8080 --data-dir /tmp/omega-ci > /tmp/omega-server.log 2>&1 &
          for _ in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8080/healthz >/dev/null && break
            sleep 1
          done
      - name: start operator (out-of-cluster, against host control plane)
        run: |
          omega operator \
            --omega-url=http://127.0.0.1:8080 \
            --metrics-addr=:8081 \
            --health-addr=:8082 > /tmp/omega-operator.log 2>&1 &
          sleep 5
      - name: apply sample OmegaDomain
        run: kubectl apply -f examples/operator/sample-domain.yaml
      - name: wait for Ready
        run: |
          for _ in $(seq 1 30); do
            ready=$(kubectl get omegadomain media-news -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
            [[ "$ready" == "True" ]] && exit 0
            sleep 2
          done
          echo "OmegaDomain did not reach Ready in time"
          kubectl describe omegadomain media-news || true
          tail -50 /tmp/omega-operator.log || true
          tail -50 /tmp/omega-server.log || true
          exit 1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        # Upstream is built with Go 1.25 and refuses to load when go.mod
        # targets Go 1.26 (golangci/golangci-lint#6272). Marked advisory
        # at the step level so a failure surfaces as a warning instead
        # of failing the job; remove this once upstream ships a Go 1.26
        # build.
        continue-on-error: true
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: scan
        run: govulncheck ./...

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # securego/gosec@master ships its own Go toolchain in the action
      # container; when go.mod requires a newer minor than that image
      # has, package loading fails and gosec reports zero files. Build
      # gosec from source against the project's go-version instead so
      # the scan stays in step with go.mod.
      - name: install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: run gosec
        run: gosec -exclude-dir=examples ./...

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: '**/*.md'
          config: .markdownlint-cli2.jsonc

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: redocly lint
        run: npx --yes @redocly/cli@latest lint api/openapi.yaml

  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # The two below are only consumed on tag pushes (cosign keyless
      # OIDC signing + GitHub native build attestation). Granted
      # unconditionally because GitHub computes the workflow's effective
      # permissions at job start; restricting to a step-level scope is
      # not supported.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: log in to ghcr.io
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/0-draft/omega
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      # ubuntu-latest is amd64; arm64 builds therefore run under QEMU
      # emulation and dominate wall time (~25 min for the arm64 leg
      # vs ~3 min for amd64). On PR / branch push we are not pushing
      # the image - the build is verification-only - so build amd64
      # alone. Multi-arch is rebuilt and pushed at tag time.
      - name: build (and push on tag)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Supply-chain steps below run only on tag push (release).

      - name: install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v3

      # Bind the keyless signature to the immutable digest, not the
      # mutable tag, so a later overwrite of the tag does not silently
      # invalidate the signature. metadata-action only ever emits tags
      # under the single `ghcr.io/0-draft/omega` image, so one cosign
      # invocation against the digest is enough.
      - name: cosign sign image (keyless)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "ghcr.io/0-draft/omega@${DIGEST}"

      # SBOM has to be per-platform: anchore/sbom-action wraps Syft,
      # which when given an OCI manifest-list reference resolves to a
      # single platform (linux/amd64 on this runner). Attesting that
      # amd64-only SBOM against the multi-arch index digest would bind
      # a valid signature over an SBOM that does not describe the
      # arm64 image consumers pull. Resolve per-arch digests from the
      # index and run sbom + cosign attest once per platform.
      - name: resolve per-arch digests from index
        if: startsWith(github.ref, 'refs/tags/v')
        id: archs
        env:
          INDEX_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          raw=$(docker buildx imagetools inspect --raw "ghcr.io/0-draft/omega@${INDEX_DIGEST}")
          amd64=$(echo "$raw" | jq -r '.manifests[] | select(.platform.os=="linux" and .platform.architecture=="amd64") | .digest')
          arm64=$(echo "$raw" | jq -r '.manifests[] | select(.platform.os=="linux" and .platform.architecture=="arm64") | .digest')
          [ -n "$amd64" ] || { echo "no linux/amd64 manifest in index" >&2; exit 1; }
          [ -n "$arm64" ] || { echo "no linux/arm64 manifest in index" >&2; exit 1; }
          echo "amd64=${amd64}" >> "$GITHUB_OUTPUT"
          echo "arm64=${arm64}" >> "$GITHUB_OUTPUT"

      - name: generate SPDX SBOM (linux/amd64)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/0-draft/omega@${{ steps.archs.outputs.amd64 }}
          format: spdx-json
          artifact-name: omega-sbom-linux-amd64.spdx.json
          output-file: ./omega-sbom-linux-amd64.spdx.json

      - name: generate SPDX SBOM (linux/arm64)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/0-draft/omega@${{ steps.archs.outputs.arm64 }}
          format: spdx-json
          artifact-name: omega-sbom-linux-arm64.spdx.json
          output-file: ./omega-sbom-linux-arm64.spdx.json

      - name: attach SBOMs as per-arch cosign attestations
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          AMD64: ${{ steps.archs.outputs.amd64 }}
          ARM64: ${{ steps.archs.outputs.arm64 }}
        run: |
          set -euo pipefail
          cosign attest --yes \
            --predicate ./omega-sbom-linux-amd64.spdx.json \
            --type spdxjson \
            "ghcr.io/0-draft/omega@${AMD64}"
          cosign attest --yes \
            --predicate ./omega-sbom-linux-arm64.spdx.json \
            --type spdxjson \
            "ghcr.io/0-draft/omega@${ARM64}"

      # GitHub-native build provenance (in-toto v1, sigstore-bundled).
      # `gh attestation verify` and `cosign verify-attestation` both
      # accept this format. Pushed to the registry next to the image.
      - name: build provenance attestation
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/0-draft/omega
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  chart-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, helm]
    permissions:
      contents: write
      # cosign keyless signing of the packaged chart needs an OIDC
      # token to authenticate against Fulcio. Granted unconditionally
      # because GitHub computes effective permissions per job.
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - uses: azure/setup-helm@v5
        with:
          version: latest
      - uses: helm/chart-releaser-action@v1
        with:
          charts_dir: charts
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # chart-releaser-action packaged the chart into
      # .cr-release-packages/omega-<chart-version>.tgz and pushed a
      # GH Release named "omega-<chart-version>" (separate from the
      # vX.Y.Z release that owns the binary). cosign-sign the tarball
      # and upload the sigstore bundle as a release asset so
      # downstream verifiers can `cosign verify-blob` after
      # `helm pull`.
      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: sign chart and upload bundle to GH release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          chart_version=$(awk '/^version:/{print $2; exit}' charts/omega/Chart.yaml)
          pkg=".cr-release-packages/omega-${chart_version}.tgz"
          if [[ ! -f "$pkg" ]]; then
            echo "no chart package at $pkg" >&2
            ls -la .cr-release-packages/ || true
            exit 1
          fi
          bundle="${pkg}.sigstore.json"
          cosign sign-blob --yes --bundle "$bundle" "$pkg"
          gh release upload "omega-${chart_version}" \
            "$bundle" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
