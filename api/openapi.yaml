openapi: 3.1.0

info:
  title: Omega control plane API
  version: 0.0.1
  summary: SPIFFE-compatible workload identity + OpenID AuthZEN 1.0 PDP.
  description: |
    HTTP/JSON surface served by `omega server` on `--http-addr` (default
    `127.0.0.1:8080`). The gRPC SPIFFE Workload API is served by
    `omega agent` on a Unix socket and is not described here.

    ## Leader-only endpoints

    When Omega runs against Postgres with HA leader election, every
    write endpoint plus `POST /access/v1/evaluation` is gated by the
    advisory-lock leader state. A non-leader replica responds with
    `503 Service Unavailable` and `Retry-After: 1`. The endpoints
    affected are tagged `leader-only` below.

    ## Audit log

    Every successful write endpoint and every authorization decision
    appends an entry to the tamper-evident audit log
    (`GET /v1/audit`). Hash chain integrity can be verified with
    `GET /v1/audit/verify`.
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  contact:
    name: Omega maintainers
    url: https://github.com/kanywst/omega

servers:
  - url: http://127.0.0.1:8080
    description: Default development listen address (single-binary quickstart).

tags:
  - name: meta
    description: Liveness, leader state, observability surfaces.
  - name: domains
    description: SPIFFE namespace CRUD.
  - name: svid
    description: X.509-SVID and JWT-SVID issuance, trust bundles.
  - name: attest
    description: Server-side workload attestation endpoints.
  - name: federation
    description: SPIFFE trust-bundle exchange across trust domains.
  - name: authzen
    description: OpenID AuthZEN 1.0 PDP evaluation.
  - name: token-exchange
    description: RFC 8693 token exchange with nested `act` claims.
  - name: oidc-federation
    description: External OIDC IdP federation for Human principals.
  - name: audit
    description: Tamper-evident audit log readout and verification.
  - name: oidc
    description: OIDC discovery for external relying parties (AWS IAM OIDC, GCP WIF, Kubernetes ServiceAccount issuer trust).
  - name: leader-only
    description: |
      Endpoints that require the current process to hold the Postgres
      advisory lock. A replica that is not the leader returns
      `503 Service Unavailable` with `Retry-After: 1`. SQLite
      single-process deployments always satisfy the leader check.

paths:
  /healthz:
    get:
      tags: [meta]
      operationId: healthz
      summary: Liveness probe.
      description: |
        Returns `ok` once the HTTP listener is accepting connections.
        Does not test database, CA key material, or leader state - use
        `/v1/leader` for leader probes.
      responses:
        "200":
          description: Process is up.
          content:
            text/plain:
              schema:
                type: string
                const: ok

  /v1/leader:
    get:
      tags: [meta]
      operationId: getLeaderState
      summary: Postgres leader state for this replica.
      description: |
        Read after start-up to gate writes to the leader. SQLite
        single-process mode always reports `is_leader: true`.
      responses:
        "200":
          description: Leader state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderStateResponse"

  /metrics:
    get:
      tags: [meta]
      operationId: getMetrics
      summary: Prometheus exposition of metrics.
      description: |
        HTTP rate / latency by route, AuthZEN decision counts and
        evaluation latency, SVID issuance by kind, audit append count,
        and the standard Go runtime collectors.
      responses:
        "200":
          description: Prometheus text exposition.
          content:
            text/plain:
              schema:
                type: string

  /v1/domains:
    get:
      tags: [domains]
      operationId: listDomains
      summary: List domains.
      responses:
        "200":
          description: Domain list (possibly empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainListResponse"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [domains, leader-only]
      operationId: createDomain
      summary: Create a SPIFFE namespace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomainCreateRequest"
      responses:
        "201":
          description: Domain created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Domain"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/NotLeader"

  /v1/domains/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: Domain name (e.g. `example`).
    get:
      tags: [domains]
      operationId: getDomain
      summary: Fetch a single domain.
      responses:
        "200":
          description: Domain.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Domain"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/attest/k8s:
    post:
      tags: [attest, leader-only]
      operationId: attestK8s
      summary: Attest a Kubernetes ServiceAccount projected token and issue an X.509-SVID.
      description: |
        The workload presents (1) a projected ServiceAccount token
        whose audience matches `--k8s-token-audience` and (2) a PEM
        CSR. The server calls back to kube-apiserver's `TokenReview`
        to validate the token, derives the SPIFFE ID from
        `--k8s-svid-template` against the validated
        `(namespace, serviceaccount[, podname])` triple, then signs
        the CSR like the regular `/v1/svid` path.

        Returns `404 Not Found` when the server was started without
        `--k8s-attest=true`. Returns `401 Unauthorized` when the
        apiserver rejects the token (expired, wrong audience, not a
        service-account token).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/K8sAttestRequest"
      responses:
        "200":
          description: Issued SVID + derived SPIFFE ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/K8sAttestResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: TokenReview rejected the projected token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/NotLeader"

  /v1/svid:
    post:
      tags: [svid, leader-only]
      operationId: issueSVID
      summary: Issue an X.509-SVID from a CSR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueSVIDRequest"
      responses:
        "200":
          description: SVID and trust bundle, both PEM-encoded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueSVIDResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/NotLeader"

  /v1/svid/jwt:
    post:
      tags: [svid, leader-only]
      operationId: issueJWTSVID
      summary: Issue a JWT-SVID.
      description: |
        `bind_cert_thumbprint`, when set, embeds an RFC 8705
        `cnf.x5t#S256` claim that binds the issued JWT-SVID to the
        SHA-256 thumbprint of the client X.509-SVID (base64url, no
        padding).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueJWTSVIDRequest"
      responses:
        "200":
          description: Issued JWT-SVID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueJWTSVIDResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/NotLeader"

  /v1/bundle:
    get:
      tags: [svid]
      operationId: getTrustBundle
      summary: X.509 trust bundle (PEM).
      responses:
        "200":
          description: Trust anchor bundle.
          content:
            application/x-pem-file:
              schema:
                type: string

  /v1/spiffe-bundle:
    get:
      tags: [svid]
      operationId: getSPIFFEBundle
      summary: SPIFFE Trust Domain Format bundle (JSON).
      description: |
        Returns the [SPIFFE Trust Domain and Bundle 1.0 §4](https://github.com/spiffe/spiffe/blob/main/standards/SPIFFE_Trust_Domain_and_Bundle.md)
        Trust Domain Format document. The JWK set in `keys` mixes
        X.509-SVID trust anchors (`use: x509-svid`, full DER in
        `x5c`) and JWT-SVID signing keys (`use: jwt-svid`). Peers
        consuming this endpoint replace the pair of `/v1/bundle`
        (PEM) + `/v1/jwt/bundle` (JWKS) with one document.
        `spiffe_sequence` is fixed at 1 until runtime key rotation
        lands; `spiffe_refresh_hint` is configurable via
        `--spiffe-bundle-refresh-hint` (default 300s).
      responses:
        "200":
          description: SPIFFE Trust Domain Format document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SPIFFEBundleResponse"

  /.well-known/openid-configuration:
    get:
      tags: [oidc]
      operationId: getOIDCDiscovery
      summary: OIDC 1.0 discovery document.
      description: |
        Returns the minimal OIDC 1.0 discovery document so external
        relying parties (AWS IAM OIDC trust, GCP Workload Identity
        Federation, Kubernetes ServiceAccount issuer trust) can verify
        Omega-issued JWT-SVIDs without a custom adapter. Returns
        `404 Not Found` when `omega server` was started without
        `--issuer-url`, in which case JWT-SVIDs also do not carry an
        `iss` claim. Omega is not an interactive OIDC IdP, so
        `authorization_endpoint`, `token_endpoint`, and
        `userinfo_endpoint` are intentionally absent.
      responses:
        "200":
          description: Discovery document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OIDCDiscoveryResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /.well-known/authzen-configuration:
    get:
      tags: [authzen]
      operationId: getAuthzenDiscovery
      summary: AuthZEN 1.0 discovery document.
      description: |
        Returns the [OpenID AuthZEN 1.0 §8](https://openid.net/specs/authorization-api-1_0.html)
        discovery document. The PDP base URL is `--issuer-url` -
        canonical, validated `https`, no query/fragment - so a PEP
        consuming this document cannot be redirected to an
        attacker-controlled URL through a spoofed `Host` header.
        Returns `404 Not Found` when `omega server` was started
        without `--issuer-url`, matching the OIDC discovery handler.
        Only the endpoints Omega implements are advertised - the
        three optional Search APIs are omitted on purpose (per §8
        their absence signals "not implemented").
      responses:
        "200":
          description: AuthZEN discovery document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthzenDiscoveryResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/jwt/bundle:
    get:
      tags: [svid]
      operationId: getJWTBundle
      summary: JWKS trust bundle for JWT-SVID verification.
      responses:
        "200":
          description: JSON Web Key Set.
          content:
            application/jwk-set+json:
              schema:
                $ref: "#/components/schemas/JWKS"

  /v1/federation/bundles:
    get:
      tags: [federation]
      operationId: getFederationBundles
      summary: Federated trust bundles (this trust domain + peers).
      description: |
        Returns the local trust domain's bundle plus any peer trust
        bundles that have been fetched at least once via
        `--federate-with`. Returns `404` when federation is not
        configured on this server.
      responses:
        "200":
          description: Bundle map keyed by trust domain.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FederationBundlesResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /access/v1/evaluations:
    post:
      tags: [authzen, leader-only]
      operationId: evaluateAccessBatch
      summary: AuthZEN 1.0 batch evaluation.
      description: |
        Implements the [AuthZEN 1.0 §5.2](https://openid.net/specs/authorization-api-1_0.html)
        batch endpoint. Top-level `subject` / `action` / `resource`
        / `context` act as defaults; each entry in `evaluations`
        inherits them unless it provides its own override. Each
        evaluation runs through the same policy path as the
        single-decision endpoint and produces one audit-log row,
        in the same order as the request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchEvalRequest"
      responses:
        "200":
          description: Per-evaluation decisions in input order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchEvalResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/NotLeader"

  /access/v1/evaluation:
    post:
      tags: [authzen, leader-only]
      operationId: evaluateAccess
      summary: AuthZEN 1.0 single-decision evaluation.
      description: |
        Implements the [OpenID AuthZEN 1.0](https://openid.net/specs/authorization-api-1_0.html)
        single-decision endpoint. Cedar is the default in-process PDP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalRequest"
      responses:
        "200":
          description: Decision.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/NotLeader"

  /access/v1/search/subject:
    post:
      tags: [authzen, leader-only]
      operationId: searchSubject
      summary: AuthZEN 1.0 Subject Search (candidate-set variant).
      description: |
        Searches a caller-supplied list of subject candidates against
        a fully specified `(action, resource)` pair and returns those
        whose decision is `allow`. Omega does not maintain a global
        principal directory, so the caller supplies the candidates
        explicitly; the spec's §5.3.2 expressly allows the PDP to
        error when it cannot resolve the search space, and a
        candidate list is a strict refinement of that contract.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectSearchRequest"
      responses:
        "200":
          description: Matched subjects.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubjectSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/NotLeader"

  /access/v1/search/resource:
    post:
      tags: [authzen, leader-only]
      operationId: searchResource
      summary: AuthZEN 1.0 Resource Search (candidate-set variant).
      description: |
        Searches a caller-supplied list of resource candidates against
        a fully specified `(subject, action)` pair and returns those
        whose decision is `allow`. Same candidate-set rationale as
        Subject Search.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceSearchRequest"
      responses:
        "200":
          description: Matched resources.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/NotLeader"

  /access/v1/search/action:
    post:
      tags: [authzen, leader-only]
      operationId: searchAction
      summary: AuthZEN 1.0 Action Search (candidate-set variant).
      description: |
        Searches a caller-supplied list of action candidates against
        a fully specified `(subject, resource)` pair and returns those
        whose decision is `allow`. Same candidate-set rationale as
        Subject Search.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionSearchRequest"
      responses:
        "200":
          description: Matched actions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/NotLeader"

  /v1/oidc/exchange:
    post:
      tags: [oidc-federation, leader-only]
      operationId: exchangeOIDC
      summary: Exchange an external OIDC IdP ID token for an omega JWT-SVID.
      description: |
        The Human principal flow. Requires `omega server` to be
        started with one or more `--oidc-idp` flags declaring the
        upstream IdPs (Keycloak, Okta, Entra ID, Google Workspace,
        Dex, Authentik). The workload posts an ID token signed by
        the named IdP plus the audience the workload wants on the
        returned JWT-SVID; omega:

        1. validates the ID token against the IdP's JWKS (fetched
           via OIDC Discovery), checks issuer / audience / expiry;
        2. renders the IdP's configured SPIFFE template against the
           validated claims (`{idp}`, `{sub}`, `{email}`,
           `{preferred_username}`, `{name}`);
        3. requires the rendered SPIFFE ID to lie in `--trust-domain`;
        4. issues a fresh omega JWT-SVID under that SPIFFE ID, with
           the upstream IdP recorded as an RFC 8693 `act` claim;
        5. records the exchange in the tamper-evident audit log.

        Returns `404 Not Found` when no IdP is configured.
        `400 Bad Request` for unknown `idp`, missing fields, or a
        template that renders outside the trust domain.
        `401 Unauthorized` when the ID token fails validation (the
        audit log records one deny row).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OIDCExchangeRequest"
      responses:
        "200":
          description: omega JWT-SVID for the Human principal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OIDCExchangeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Upstream ID token rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/NotLeader"

  /v1/token/exchange:
    post:
      tags: [token-exchange, leader-only]
      operationId: tokenExchange
      summary: RFC 8693 token exchange.
      description: |
        Issues a new JWT-SVID that delegates the subject token's
        principal to the actor identity, recording the chain in the
        nested `act` claim. The output token's TTL is capped at the
        subject token's remaining lifetime.

        When the server is started with token-exchange policy
        enforcement enabled, the request is also evaluated through
        Cedar with `action: token.exchange` before issuance; the
        baseline `requested_spiffe_id == actor_token.sub` rule always
        applies regardless.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenExchangeRequest"
      responses:
        "200":
          description: New JWT-SVID with delegation chain.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenExchangeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/NotLeader"

  /v1/audit:
    get:
      tags: [audit]
      operationId: listAudit
      summary: List audit events.
      parameters:
        - name: since
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 0
          description: Return events with `seq > since`. `0` returns from genesis.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Maximum number of events. Defaults to the store's internal cap.
      responses:
        "200":
          description: Audit event list (possibly empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditListResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/audit/verify:
    get:
      tags: [audit]
      operationId: verifyAudit
      summary: Verify the audit log hash chain.
      description: |
        Walks the chain from genesis. `valid: true` and
        `first_bad_seq: 0` means every row's MAC matches. A non-zero
        `first_bad_seq` is the lowest sequence at which the chain breaks.

        Optionally pin an external checkpoint with `expected_head` and
        `expected_count` (both required together) so tail truncation below
        the anchor is reported as `truncated: true`.
      parameters:
        - name: expected_head
          in: query
          required: false
          description: |
            Anchored verification: the expected head hash at a prior
            checkpoint. Must be supplied together with `expected_count`.
          schema:
            type: string
        - name: expected_count
          in: query
          required: false
          description: |
            Anchored verification: the expected row count at the
            checkpoint. Non-negative; must accompany `expected_head`.
          schema:
            type: integer
            format: int64
            minimum: 0
      responses:
        "200":
          description: Verification result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditVerifyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  schemas:
    Error:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message.

    LeaderStateResponse:
      type: object
      additionalProperties: false
      required: [is_leader]
      properties:
        is_leader:
          type: boolean

    Domain:
      type: object
      additionalProperties: false
      required: [name, created_at]
      properties:
        name:
          type: string
          examples: [example]
        parent:
          type: string
          description: Parent domain name (omitted for top-level domains).
        description:
          type: string
        created_at:
          type: string
          format: date-time

    DomainCreateRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
        parent:
          type: string
        description:
          type: string

    DomainListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Domain"

    IssueSVIDRequest:
      type: object
      additionalProperties: false
      required: [spiffe_id, csr]
      properties:
        spiffe_id:
          type: string
          examples: ["spiffe://omega.local/example/web"]
        csr:
          type: string
          description: PEM-encoded `CERTIFICATE REQUEST`.

    IssueSVIDResponse:
      type: object
      additionalProperties: false
      required: [svid, bundle, expires_at]
      properties:
        svid:
          type: string
          description: PEM-encoded leaf certificate.
        bundle:
          type: string
          description: PEM-encoded trust anchor bundle.
        expires_at:
          type: string
          format: date-time

    OIDCExchangeRequest:
      type: object
      additionalProperties: false
      required: [idp, id_token, audience]
      properties:
        idp:
          type: string
          description: |
            Name of the IdP registered at startup via
            `--oidc-idp 'name=...,issuer=...,audience=...,template=...'`.
        id_token:
          type: string
          description: ID token (JWS) issued by the upstream IdP.
        audience:
          type: array
          minItems: 1
          items:
            type: string
          description: Audience claim values for the issued omega JWT-SVID.
        ttl_seconds:
          type: integer
          minimum: 0
          description: Requested lifetime. Capped at the upstream ID token's remaining lifetime.

    OIDCExchangeResponse:
      type: object
      additionalProperties: false
      required: [access_token, token_type, spiffe_id, audience, expires_in, kid, idp]
      properties:
        access_token:
          type: string
          description: omega JWT-SVID compact JWS.
        token_type:
          type: string
          const: Bearer
        spiffe_id:
          type: string
          description: Rendered SPIFFE ID under which the JWT-SVID was issued.
        audience:
          type: array
          items:
            type: string
        expires_in:
          type: integer
          minimum: 0
        kid:
          type: string
        idp:
          type: string
          description: Name of the IdP that authenticated the upstream token.

    K8sAttestRequest:
      type: object
      additionalProperties: false
      required: [token, csr]
      properties:
        token:
          type: string
          description: |
            Kubernetes ServiceAccount projected token. The token's
            audience must match the server's `--k8s-token-audience`
            when that flag is set.
        csr:
          type: string
          description: PEM-encoded x509 `CERTIFICATE REQUEST`.

    K8sAttestResponse:
      type: object
      additionalProperties: false
      required: [spiffe_id, svid, bundle, expires_at]
      properties:
        spiffe_id:
          type: string
          description: |
            SPIFFE ID rendered from the server's
            `--k8s-svid-template` against the validated
            `(namespace, serviceaccount[, podname])` triple.
        svid:
          type: string
          description: PEM-encoded leaf certificate.
        bundle:
          type: string
          description: PEM-encoded trust anchor bundle.
        expires_at:
          type: string
          format: date-time

    IssueJWTSVIDRequest:
      type: object
      additionalProperties: false
      required: [spiffe_id, audience]
      properties:
        spiffe_id:
          type: string
        audience:
          type: array
          minItems: 1
          items:
            type: string
        ttl_seconds:
          type: integer
          minimum: 0
          description: Requested lifetime. Server-side caps may apply.
        bind_cert_thumbprint:
          type: string
          description: |
            base64url-encoded SHA-256 thumbprint of the client
            X.509-SVID. Embedded as `cnf.x5t#S256` per RFC 8705.

    IssueJWTSVIDResponse:
      type: object
      additionalProperties: false
      required: [token, spiffe_id, audience, issued_at, expires_at, kid]
      properties:
        token:
          type: string
          description: Compact JWS.
        spiffe_id:
          type: string
        audience:
          type: array
          items:
            type: string
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        kid:
          type: string
          description: JWKS key id used to sign the token.

    FederationBundlesResponse:
      type: object
      additionalProperties: false
      required: [trust_domains]
      properties:
        trust_domains:
          type: object
          additionalProperties:
            type: string
            description: PEM-encoded trust anchor bundle for one trust domain.

    SPIFFEBundleResponse:
      type: object
      additionalProperties: false
      required:
        - spiffe_sequence
        - spiffe_refresh_hint
        - keys
      properties:
        spiffe_sequence:
          type: integer
          format: int64
          description: |
            Monotonically increasing version of this trust bundle.
            Omega returns `1` until runtime key rotation is wired up.
        spiffe_refresh_hint:
          type: integer
          description: |
            Recommended minimum number of seconds peers should wait
            before re-fetching the bundle.
        keys:
          type: array
          items:
            type: object
            description: |
              JWK per RFC 7517 with an extra `use` parameter set to
              either `x509-svid` (root certificate; full DER in `x5c`)
              or `jwt-svid` (JWT signing public key).

    JWKS:
      type: object
      description: |
        JSON Web Key Set per RFC 7517. The Omega server returns the
        active and any not-yet-rotated public signing keys.
      properties:
        keys:
          type: array
          items:
            type: object
            description: A JSON Web Key. Standard RFC 7517 fields.

    AuthzenDiscoveryResponse:
      type: object
      additionalProperties: false
      required:
        - policy_decision_point
        - access_evaluation_endpoint
        - access_evaluations_endpoint
        - subject_search_endpoint
        - resource_search_endpoint
        - action_search_endpoint
      properties:
        policy_decision_point:
          type: string
          format: uri
          description: Base URL of the PDP.
        access_evaluation_endpoint:
          type: string
          format: uri
          description: Absolute URL of `POST /access/v1/evaluation`.
        access_evaluations_endpoint:
          type: string
          format: uri
          description: Absolute URL of the batch endpoint `POST /access/v1/evaluations`.
        subject_search_endpoint:
          type: string
          format: uri
          description: Absolute URL of `POST /access/v1/search/subject`.
        resource_search_endpoint:
          type: string
          format: uri
          description: Absolute URL of `POST /access/v1/search/resource`.
        action_search_endpoint:
          type: string
          format: uri
          description: Absolute URL of `POST /access/v1/search/action`.

    SearchPage:
      type: object
      additionalProperties: false
      properties:
        size:
          type: integer
          description: Page size echoed back (or selected by omega when omitted).
        offset:
          type: integer
          description: Offset into the matched-candidate list.
        next_token:
          type: string
          description: |
            Opaque continuation token (`offset:N` today). Present
            only when more matches remain.

    SubjectSearchRequest:
      type: object
      additionalProperties: false
      required: [subjects, action, resource]
      properties:
        subjects:
          type: array
          maxItems: 100
          description: |
            Caller-supplied candidate subjects to test. omega does not
            enumerate principals on its own; the spec's §5.3.2 allows
            the PDP to error when it cannot resolve the search space,
            and a candidate list refines that contract into something
            useful. Capped at 100 (`MaxSearchCandidates`) for the
            same hash-chain-mutex reason as the batch endpoint.
          items:
            $ref: "#/components/schemas/EvalEntity"
        action:
          $ref: "#/components/schemas/EvalAction"
        resource:
          $ref: "#/components/schemas/EvalEntity"
        context:
          type: object
          additionalProperties: true
        page:
          $ref: "#/components/schemas/SearchPage"

    SubjectSearchResponse:
      type: object
      additionalProperties: false
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/EvalEntity"
        page:
          $ref: "#/components/schemas/SearchPage"

    ResourceSearchRequest:
      type: object
      additionalProperties: false
      required: [resources, subject, action]
      properties:
        resources:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/EvalEntity"
        subject:
          $ref: "#/components/schemas/EvalEntity"
        action:
          $ref: "#/components/schemas/EvalAction"
        context:
          type: object
          additionalProperties: true
        page:
          $ref: "#/components/schemas/SearchPage"

    ResourceSearchResponse:
      type: object
      additionalProperties: false
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/EvalEntity"
        page:
          $ref: "#/components/schemas/SearchPage"

    ActionSearchRequest:
      type: object
      additionalProperties: false
      required: [actions, subject, resource]
      properties:
        actions:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/EvalAction"
        subject:
          $ref: "#/components/schemas/EvalEntity"
        resource:
          $ref: "#/components/schemas/EvalEntity"
        context:
          type: object
          additionalProperties: true
        page:
          $ref: "#/components/schemas/SearchPage"

    ActionSearchResponse:
      type: object
      additionalProperties: false
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/EvalAction"
        page:
          $ref: "#/components/schemas/SearchPage"

    OIDCDiscoveryResponse:
      type: object
      additionalProperties: false
      required:
        - issuer
        - jwks_uri
        - response_types_supported
        - subject_types_supported
        - id_token_signing_alg_values_supported
      properties:
        issuer:
          type: string
          format: uri
          description: Public issuer URL configured via `--issuer-url`.
        jwks_uri:
          type: string
          format: uri
          description: |
            Always `<issuer>/v1/jwt/bundle`. The JWKS itself is at
            `GET /v1/jwt/bundle`.
        response_types_supported:
          type: array
          items:
            type: string
          examples: [[id_token]]
        subject_types_supported:
          type: array
          items:
            type: string
          examples: [[public]]
        id_token_signing_alg_values_supported:
          type: array
          items:
            type: string
          examples: [[ES256]]

    EvalEntity:
      type: object
      additionalProperties: false
      required: [type, id]
      properties:
        type:
          type: string
          description: AuthZEN entity type (Cedar entity type when using the default PDP).
          examples: [Spiffe, HttpPath]
        id:
          type: string
        properties:
          type: object
          additionalProperties: true
          description: AuthZEN entity attributes (Cedar `properties`).

    EvalAction:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          examples: [GET, "token.exchange"]

    EvalRequest:
      type: object
      additionalProperties: false
      required: [subject, action, resource]
      properties:
        subject:
          $ref: "#/components/schemas/EvalEntity"
        action:
          $ref: "#/components/schemas/EvalAction"
        resource:
          $ref: "#/components/schemas/EvalEntity"
        context:
          type: object
          additionalProperties: true

    EvalResponse:
      type: object
      additionalProperties: false
      required: [decision]
      properties:
        decision:
          type: boolean
        reasons:
          type: array
          items:
            type: string
          description: |
            Identifiers of the policies that produced the decision.
            Order is not stable; use only for observability.

    BatchEvalSubrequest:
      type: object
      additionalProperties: false
      description: |
        One entry in a batch evaluation. Every field is optional;
        omitted fields inherit the top-level default from
        `BatchEvalRequest`.
      properties:
        subject:
          $ref: "#/components/schemas/EvalEntity"
        action:
          $ref: "#/components/schemas/EvalAction"
        resource:
          $ref: "#/components/schemas/EvalEntity"
        context:
          type: object
          additionalProperties: true

    BatchEvalRequest:
      type: object
      additionalProperties: false
      required: [evaluations]
      description: |
        AuthZEN 1.0 batch evaluation request. Top-level subject /
        action / resource / context are defaults. After merging each
        entry with the defaults the result must be a complete
        evaluation; a missing required field is `400 Bad Request`.
      properties:
        subject:
          $ref: "#/components/schemas/EvalEntity"
        action:
          $ref: "#/components/schemas/EvalAction"
        resource:
          $ref: "#/components/schemas/EvalEntity"
        context:
          type: object
          additionalProperties: true
        evaluations:
          type: array
          maxItems: 100
          description: |
            Capped at 100 entries to bound the audit-mutex hold time
            of one batch. Larger batches should be fanned out on the
            client.
          items:
            $ref: "#/components/schemas/BatchEvalSubrequest"

    BatchEvalResponse:
      type: object
      additionalProperties: false
      required: [evaluations]
      properties:
        evaluations:
          type: array
          items:
            $ref: "#/components/schemas/EvalResponse"

    TokenExchangeRequest:
      type: object
      additionalProperties: false
      required:
        - grant_type
        - subject_token
        - subject_token_type
        - actor_token
        - actor_token_type
        - requested_spiffe_id
        - audience
      properties:
        grant_type:
          type: string
          const: "urn:ietf:params:oauth:grant-type:token-exchange"
        subject_token:
          type: string
          description: JWT-SVID for the principal being delegated.
        subject_token_type:
          type: string
          const: "urn:ietf:params:oauth:token-type:jwt"
        actor_token:
          type: string
          description: JWT-SVID for the workload requesting the exchange.
        actor_token_type:
          type: string
          const: "urn:ietf:params:oauth:token-type:jwt"
        requested_spiffe_id:
          type: string
          description: |
            SPIFFE ID for the issued token. Must equal `actor_token.sub`
            (a workload can only request a delegated token for
            itself).
        audience:
          type: array
          minItems: 1
          items:
            type: string
        scope:
          type: string
        ttl_seconds:
          type: integer
          minimum: 0

    TokenExchangeResponse:
      type: object
      additionalProperties: false
      required:
        - access_token
        - issued_token_type
        - token_type
        - expires_in
        - spiffe_id
        - audience
        - delegation_chain
        - kid
      properties:
        access_token:
          type: string
        issued_token_type:
          type: string
          const: "urn:ietf:params:oauth:token-type:jwt"
        token_type:
          type: string
          const: Bearer
        expires_in:
          type: integer
          minimum: 0
        scope:
          type: string
        spiffe_id:
          type: string
        audience:
          type: array
          items:
            type: string
        delegation_chain:
          type: array
          items:
            type: string
          description: |
            Flattened root → leaf list of subjects, derived from the
            issued token's nested `act` claim. The last element equals
            `requested_spiffe_id`.
        kid:
          type: string

    AuditEvent:
      type: object
      additionalProperties: false
      required: [seq, ts, kind, prev_hash, hash]
      properties:
        seq:
          type: integer
          format: int64
          description: Monotonically increasing sequence assigned by the store.
        ts:
          type: string
          format: date-time
        kind:
          type: string
          examples: ["domain.create", "svid.issue.x509", "svid.issue.jwt", "access.evaluate", "token.exchange"]
        actor:
          type: string
        subject:
          type: string
        decision:
          type: string
          examples: [ok, allow, deny]
        payload:
          description: Per-kind structured details. Always a JSON value, often an object.
        prev_hash:
          type: string
          description: Hash of the previous row, or `GENESIS` for the first.
        hash:
          type: string
          description: SHA-256 of (seq, ts, kind, actor, subject, decision, payload, prev_hash).

    AuditListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"

    AuditVerifyResponse:
      type: object
      additionalProperties: false
      required: [valid, first_bad_seq]
      properties:
        valid:
          type: boolean
        first_bad_seq:
          type: integer
          format: int64
          description: |
            `0` when the chain is intact. Otherwise the lowest sequence
            number at which the recomputed hash diverges from the
            stored one.
        truncated:
          type: boolean
          description: |
            Present for anchored verification: `true` when the live tail
            is shorter than the pinned `expected_count` / `expected_head`
            checkpoint (tail truncation), distinct from a hash mismatch.
        count:
          type: integer
          format: int64
          description: Number of rows walked.
        head_hash:
          type: string
          description: The hash of the last (head) row walked.

  responses:
    BadRequest:
      description: Validation failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    Forbidden:
      description: Authorization failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    NotFound:
      description: Resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    Conflict:
      description: Resource already exists.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    InternalError:
      description: Server-side error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    NotLeader:
      description: |
        This replica is not the Postgres advisory-lock leader. Retry
        against the leader (`GET /v1/leader`) or, on transient
        failover, after the `Retry-After` window.
      headers:
        Retry-After:
          schema:
            type: string
            const: "1"
          description: Seconds to wait before retrying.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
